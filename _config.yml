title: "Alex Blog"
author: "Alex Carvalho"
description: "Space to add some content from subjects that I'm studying."

remote_theme: pages-themes/minimal@v0.2.0

# email: "example@mail.com"
github_username: "alex-carvalho"
linkedin_username: "alex-carvalho-ac"


rss: rss

kramdown:
  syntax_highlighter_opts:
    disable: true
    
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-remote-theme

titles_from_headings:
  strip_title: true
  collections: true

defaults:
  - scope:
      path: ""
      type: post
    values:
      tags: Other
